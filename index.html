<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GhostPad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass: rgba(12, 12, 18, 0.52);
    --glass-border: rgba(255,255,255,0.08);
    --glass-hover: rgba(255,255,255,0.06);
    --glass-active: rgba(120,200,255,0.12);
    --accent: rgba(120, 200, 255, 0.9);
    --accent-dim: rgba(120, 200, 255, 0.18);
    --tint: transparent;
    --tint-strength: 0.18;
    --text-primary: rgba(230, 235, 255, 0.92);
    --text-dim: rgba(180, 190, 220, 0.45);
    --danger: rgba(255, 100, 100, 0.8);
    --radius: 14px;
    --bg-color: #0c0c12;
    --shell-alpha: 0.52;
  }

  html, body { width:100%; height:100%; background:transparent; overflow:hidden;
    font-family:'Syne',sans-serif; -webkit-font-smoothing:antialiased; }

  .shell {
    position:relative;
    width:100%; height:100%;
    display:flex; flex-direction:column;
    background:var(--glass);
    backdrop-filter:blur(28px) saturate(160%);
    -webkit-backdrop-filter:blur(28px) saturate(160%);
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    box-shadow: 0 0 0 0.5px rgba(255,255,255,0.04) inset, 0 24px 80px rgba(0,0,0,0.55);
    overflow:hidden;
    animation:fadeIn 0.4s ease;
    transition:background 0.25s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  body.flush .shell { border-radius:0; }

  .tint-layer { position:absolute; inset:0; pointer-events:none; background:var(--tint); opacity:var(--tint-strength); mix-blend-mode:overlay; z-index:0; transition:background 0.25s ease,opacity 0.25s ease; }

  /* Titlebar */
  .titlebar { display:flex; align-items:center; gap:8px; padding:10px 14px 8px; -webkit-app-region:drag; user-select:none; border-bottom:1px solid var(--glass-border); flex-shrink:0; }
  .dots { display:flex; gap:6px; -webkit-app-region:no-drag; }
  .dot { width:11px; height:11px; border-radius:50%; cursor:pointer; border:1px solid rgba(0,0,0,0.25); transition:opacity 0.15s,transform 0.12s; }
  .dot:hover{opacity:0.75;transform:scale(1.12)} .dot:active{transform:scale(0.92)}
  .dot.close{background:#ff5f57} .dot.min{background:#ffbd2e} .dot.full{background:#28c840}
  .dot:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .title { font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-dim); margin-left:4px; flex:1; }
  .status-pill { font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; padding:3px 8px; border-radius:20px; border:1px solid; transition:all 0.25s; -webkit-app-region:no-drag; }
  .status-pill.interactive { color:var(--accent); border-color:var(--accent-dim); background:rgba(120,200,255,0.07); }
  .status-pill.passthrough { color:rgba(255,180,80,0.9); border-color:rgba(255,180,80,0.3); background:rgba(255,180,80,0.07); animation:pulse 2s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }

  /* Toolbar (wraps onto a second row on small widths) */
  .toolbar { display:flex; align-items:center; gap:4px; padding:7px 12px; border-bottom:1px solid var(--glass-border); flex-shrink:0; flex-wrap:wrap; row-gap:6px; }
  .toolbar-group { display:flex; align-items:center; gap:2px; }
  .toolbar-group.right { margin-left:auto; }
  .toolbar-sep { width:1px; height:18px; background:var(--glass-border); margin:0 4px; }
  .tb-btn { min-width:28px; height:28px; padding:0 4px; border:none; background:transparent; color:var(--text-dim); border-radius:6px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:background 0.15s,color 0.15s,transform 0.1s; font-family:'Georgia',serif; }
  .tb-btn:hover{ background:var(--glass-hover); color:var(--text-primary); }
  .tb-btn:active{ transform:scale(0.9); }
  .tb-btn.active{ background:var(--accent-dim); color:var(--accent); }
  .tb-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }
  .tb-btn.icon{ font-family:inherit; font-size:14px; }
  .tb-select { background:transparent; border:1px solid var(--glass-border); color:var(--text-dim); font-size:10px; font-family:'JetBrains Mono',monospace; border-radius:5px; padding:2px 4px; cursor:pointer; outline:none; }
  .tb-select option { background:#1a1a2a; color:var(--text-primary); }
  .tb-select.format { width:78px; }
  .tb-select.font   { width:64px; }
  .tb-select.size   { width:46px; }
  .color-strip { display:flex; gap:5px; align-items:center; }
  .swatch { width:15px; height:15px; border-radius:50%; cursor:pointer; border:1.5px solid rgba(255,255,255,0.12); transition:transform 0.12s,border-color 0.12s; }
  .swatch:hover{transform:scale(1.25)} .swatch.active{border-color:white;transform:scale(1.2)}
  .swatch.clear { background:transparent !important; border-style:dashed; }
  .swatch.clear::before { content:'⊘'; font-size:11px; color:var(--text-dim); line-height:1; display:flex; align-items:center; justify-content:center; height:100%; }
  .color-input-wrap { position:relative; width:15px; height:15px; }
  .color-input-wrap input[type=color] { position:absolute; inset:0; width:100%; height:100%; border:none; background:transparent; padding:0; cursor:pointer; border-radius:50%; opacity:0; }
  .color-picker-icon { width:15px; height:15px; border-radius:50%; border:1.5px dashed rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--text-dim); pointer-events:none; }

  /* Layout */
  .layout { display:flex; flex:1; overflow:hidden; }
  .sidebar { width:172px; flex-shrink:0; border-right:1px solid var(--glass-border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar-header { display:flex; align-items:center; justify-content:space-between; padding:9px 10px 7px; border-bottom:1px solid var(--glass-border); flex-shrink:0; }
  .sidebar-label { font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); }
  .sidebar-actions { display:flex; gap:4px; }
  .new-btn { width:20px; height:20px; border-radius:5px; background:var(--accent-dim); border:1px solid var(--accent-dim); color:var(--accent); font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s,transform 0.1s; font-family:inherit; }
  .new-btn:hover{ background:rgba(120,200,255,0.28); }
  .new-btn:active{ transform:scale(0.9); }
  .new-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }
  .new-btn.folder{ background:rgba(255,255,255,0.05); border-color:var(--glass-border); color:var(--text-dim); }
  .new-btn.folder:hover{ background:var(--glass-hover); color:var(--text-primary); }
  .tree { flex:1; overflow-y:auto; padding:6px; }
  .tree::-webkit-scrollbar{ width:2px; } .tree::-webkit-scrollbar-thumb{ background:var(--glass-border); border-radius:2px; }
  .tree.drop-root{ background:var(--accent-dim); border-radius:8px; }

  /* Tree rows */
  .tree-row { display:flex; align-items:center; gap:4px; padding:5px 6px; border-radius:7px; cursor:pointer; transition:background 0.12s; margin-bottom:2px; }
  .tree-row:hover{ background:var(--glass-hover); }
  .tree-row.active{ background:var(--glass-active); }
  .tree-row.drop-target{ background:var(--accent-dim); box-shadow:0 0 0 1px var(--accent-dim) inset; }
  .tree-row.dragging{ opacity:0.4; }
  .row-caret{ width:12px; flex-shrink:0; text-align:center; font-size:9px; color:var(--text-dim); transition:transform 0.15s; user-select:none; }
  .row-caret.collapsed{ transform:rotate(-90deg); }
  .row-caret.leaf{ visibility:hidden; }
  .row-icon{ width:13px; flex-shrink:0; text-align:center; font-size:11px; color:var(--text-dim); }
  .folder-row.active .row-icon, .folder-row.active .row-name{ color:var(--accent); }
  .row-name{ flex:1; min-width:0; font-size:11px; font-weight:600; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; outline:none; border:none; background:transparent; font-family:'Syne',sans-serif; border-radius:3px; transition:color 0.15s; -webkit-user-modify:read-write-plaintext-only; }
  .note-row.active .row-name{ color:var(--accent); }
  .row-name:focus{ white-space:normal; overflow:visible; text-overflow:initial; background:rgba(255,255,255,0.06); padding:0 3px; cursor:text; color:var(--text-primary) !important; }
  .row-actions{ display:flex; gap:1px; flex-shrink:0; opacity:0; transition:opacity 0.15s; }
  .tree-row:hover .row-actions{ opacity:1; }
  .row-act{ width:15px; height:15px; border:none; background:none; cursor:pointer; color:var(--text-dim); font-size:10px; line-height:1; display:flex; align-items:center; justify-content:center; border-radius:3px; padding:0; font-family:inherit; }
  .row-act:hover{ color:var(--text-primary); background:var(--glass-hover); }
  .row-act.del:hover{ color:var(--danger); }
  .row-act:focus-visible{ outline:1px solid var(--accent); }
  .note-meta{ display:flex; flex-direction:column; min-width:0; flex:1; }
  .note-preview { font-size:9px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.35; }
  .note-date    { font-size:8px; color:rgba(180,190,220,0.28); font-family:'JetBrains Mono',monospace; }
  .tree-children{ margin-left:9px; padding-left:5px; border-left:1px solid var(--glass-border); }
  .tree-children.collapsed{ display:none; }
  .tree-empty{ font-size:9px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; padding:8px 6px; text-align:center; }

  /* Editor */
  .editor-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #editor { flex:1; padding:16px 18px; overflow-y:auto; outline:none; font-family:'JetBrains Mono',monospace; font-size:14px; line-height:1.75; color:var(--text-primary); caret-color:var(--accent); word-break:break-word; white-space:pre-wrap; }
  #editor::-webkit-scrollbar{ width:3px; } #editor::-webkit-scrollbar-thumb{ background:var(--glass-border); border-radius:3px; }
  #editor:empty::before{ content:attr(data-placeholder); color:var(--text-dim); pointer-events:none; }

  /* Apple-Notes-ish block styles inside the editor */
  #editor h1 { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; line-height:1.25; margin:8px 0 4px; }
  #editor h2 { font-family:'Syne',sans-serif; font-size:17px; font-weight:600; line-height:1.3;  margin:6px 0 3px; }
  #editor h3 { font-family:'Syne',sans-serif; font-size:14px; font-weight:600; line-height:1.35; margin:4px 0 2px; color:var(--text-primary); }
  #editor p, #editor div { margin:0; }
  #editor ul, #editor ol { padding-left:22px; margin:2px 0; }
  #editor li { margin:1px 0; }
  #editor a { color:var(--accent); }

  /* Checklist line */
  .gp-check { display:flex; align-items:baseline; gap:6px; padding:1px 0; }
  .gp-check input[type=checkbox] { appearance:none; -webkit-appearance:none; width:13px; height:13px; flex-shrink:0; border:1.5px solid var(--text-dim); border-radius:50%; background:transparent; cursor:pointer; position:relative; transform:translateY(2px); transition:all 0.15s; }
  .gp-check input[type=checkbox]:checked { background:var(--accent); border-color:var(--accent); }
  .gp-check input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:-3px; left:1px; color:#0c0c12; font-size:10px; font-weight:700; }
  .gp-check.done .gp-check-text { color:var(--text-dim); text-decoration:line-through; }
  .gp-check-text { flex:1; min-width:1ch; outline:none; }

  /* Bottombar */
  .bottombar { display:flex; align-items:center; justify-content:space-between; padding:5px 14px; border-top:1px solid var(--glass-border); flex-shrink:0; }
  .hint { font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }
  .word-count { font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }

  /* Floating side panel (theme) */
  .panel {
    position:absolute; right:8px; top:46px; z-index:20;
    -webkit-app-region:no-drag;
    background:rgba(16,16,24,0.92); backdrop-filter:blur(24px) saturate(160%); -webkit-backdrop-filter:blur(24px) saturate(160%);
    border:1px solid var(--glass-border); border-radius:12px;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
    padding:12px; opacity:0; transform:translateX(8px) scale(0.97); pointer-events:none;
    transition:opacity 0.18s ease,transform 0.18s ease;
  }
  .panel.open{ opacity:1; transform:none; pointer-events:auto; }
  .panel-title{ font-size:9px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); margin-bottom:10px; }
  .theme-panel{ width:188px; }
  .theme-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .theme-row label{ font-size:10px; color:var(--text-primary); font-family:'JetBrains Mono',monospace; }
  .theme-row input[type=color]{ width:26px; height:18px; border:1px solid var(--glass-border); border-radius:4px; background:transparent; cursor:pointer; padding:0; }
  .preset-grid{ display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:6px; }
  .preset-btn{ font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); background:var(--glass-hover); border:1px solid var(--glass-border); border-radius:6px; padding:6px 4px; cursor:pointer; transition:background 0.15s,color 0.15s,transform 0.1s; text-align:center; }
  .preset-btn:hover{ color:var(--text-primary); background:rgba(255,255,255,0.1); }
  .preset-btn:active{ transform:scale(0.95); }
  .preset-btn:focus-visible{ outline:1px solid var(--accent); }
  .theme-sep{ height:1px; background:var(--glass-border); margin:10px 0 8px; }
  .theme-reset{ width:100%; font-size:9px; font-family:'JetBrains Mono',monospace; color:var(--text-dim); background:none; border:1px solid var(--glass-border); border-radius:6px; padding:5px; cursor:pointer; margin-top:8px; transition:color 0.15s,border-color 0.15s; }
  .theme-reset:hover{ color:var(--danger); border-color:var(--danger); }

  /* Save flash / color hint */
  .save-flash { position:fixed; bottom:26px; right:14px; font-size:9px; font-family:'JetBrains Mono',monospace; color:rgba(120,255,160,0.7); letter-spacing:0.08em; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:30; }
  .save-flash.show{ opacity:1; }
  .color-hint { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); font-size:9px; font-family:'JetBrains Mono',monospace; color:rgba(120,200,255,0.65); letter-spacing:0.08em; opacity:0; transition:opacity 0.4s; pointer-events:none; z-index:30; }
</style>
</head>
<body>
<div class="shell">
  <div class="tint-layer"></div>

  <div class="titlebar">
    <div class="dots">
      <div class="dot close" tabindex="0" role="button" title="Закрыть" onclick="winClose()"></div>
      <div class="dot min"   tabindex="0" role="button" title="Свернуть" onclick="winMinimize()"></div>
      <div class="dot full"  tabindex="0" role="button" title="Развернуть · F11 — полноэкранный" onclick="winToggleMaximize()"></div>
    </div>
    <span class="title">GhostPad</span>
    <span class="status-pill interactive" id="statusPill">● Активен</span>
  </div>

  <div class="toolbar">
    <div class="toolbar-group">
      <select class="tb-select format" id="formatBlock" title="Стиль абзаца" onchange="setHeading(this.value); this.blur()">
        <option value="p">Текст</option>
        <option value="h1">Заголовок</option>
        <option value="h2">Подзаголовок</option>
        <option value="h3">Раздел</option>
      </select>
      <select class="tb-select font" id="fontFamily" title="Шрифт" onchange="setFontFamily(this.value); this.blur()">
        <option value="mono"  selected>Mono</option>
        <option value="sans">Sans</option>
        <option value="serif">Serif</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <button class="tb-btn" id="btnB" title="Жирный (⌘/Ctrl+B)"        onclick="fmt('bold')"><b>B</b></button>
      <button class="tb-btn" id="btnI" title="Курсив (⌘/Ctrl+I)"        onclick="fmt('italic')"><i>I</i></button>
      <button class="tb-btn" id="btnU" title="Подчёркнутый (⌘/Ctrl+U)" onclick="fmt('underline')" style="text-decoration:underline">U</button>
      <button class="tb-btn" id="btnS" title="Зачёркнутый"             onclick="fmt('strikeThrough')" style="text-decoration:line-through">S</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <select class="tb-select size" id="fontSize" title="Размер шрифта" onchange="changeFontSize(this.value); this.blur()">
        <option value="11">11</option><option value="12">12</option><option value="13">13</option>
        <option value="14" selected>14</option><option value="16">16</option><option value="18">18</option>
        <option value="22">22</option><option value="28">28</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group" title="Выравнивание">
      <button class="tb-btn icon" id="btnAlignLeft"   title="По левому краю"  onclick="setAlign('left')">⇤</button>
      <button class="tb-btn icon" id="btnAlignCenter" title="По центру"       onclick="setAlign('center')">⇔</button>
      <button class="tb-btn icon" id="btnAlignRight"  title="По правому краю" onclick="setAlign('right')">⇥</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group" title="Списки">
      <button class="tb-btn icon" title="Маркированный список" onclick="insertList('unordered')">•</button>
      <button class="tb-btn icon" title="Нумерованный список"  onclick="insertList('ordered')">≡</button>
      <button class="tb-btn icon" title="Чек-лист"              onclick="insertChecklist()">☐</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="color-strip" title="Цвет текста">
      <div class="swatch active" style="background:#e6ebff" data-hex="#e6ebff" onclick="setColor('#e6ebff',this)"></div>
      <div class="swatch" style="background:#78c8ff" data-hex="#78c8ff" onclick="setColor('#78c8ff',this)"></div>
      <div class="swatch" style="background:#b0ff78" data-hex="#b0ff78" onclick="setColor('#b0ff78',this)"></div>
      <div class="swatch" style="background:#ffda78" data-hex="#ffda78" onclick="setColor('#ffda78',this)"></div>
      <div class="swatch" style="background:#ff9678" data-hex="#ff9678" onclick="setColor('#ff9678',this)"></div>
      <div class="swatch" style="background:#d078ff" data-hex="#d078ff" onclick="setColor('#d078ff',this)"></div>
      <div class="swatch" style="background:#ff6464" data-hex="#ff6464" onclick="setColor('#ff6464',this)"></div>
      <div class="color-input-wrap" title="Свой цвет">
        <div class="color-picker-icon">+</div>
        <input type="color" id="customColor" value="#ffffff" oninput="setColor(this.value,null)">
      </div>
    </div>
    <div class="toolbar-sep"></div>
    <div class="color-strip" title="Подсветка фона">
      <div class="swatch hl-swatch clear"                                                   onclick="setHighlight('transparent', this)"></div>
      <div class="swatch hl-swatch" style="background:rgba(255,225,80,0.45)"  data-hex="#ffe150" onclick="setHighlight('rgba(255,225,80,0.45)', this)"></div>
      <div class="swatch hl-swatch" style="background:rgba(120,255,160,0.35)" data-hex="#78ffa0" onclick="setHighlight('rgba(120,255,160,0.35)', this)"></div>
      <div class="swatch hl-swatch" style="background:rgba(120,200,255,0.35)" data-hex="#78c8ff" onclick="setHighlight('rgba(120,200,255,0.35)', this)"></div>
      <div class="swatch hl-swatch" style="background:rgba(255,140,200,0.35)" data-hex="#ff8cc8" onclick="setHighlight('rgba(255,140,200,0.35)', this)"></div>
    </div>
    <div class="toolbar-group right">
      <button class="tb-btn icon" id="btnTransparency" title="Прозрачность (откроется в отдельном окне справа)" onclick="toggleTransparencySlider()">◐</button>
      <button class="tb-btn icon" id="btnTheme"        title="Оформление" aria-haspopup="true" onclick="togglePanel('theme')">✦</button>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-label">Заметки</span>
        <div class="sidebar-actions">
          <button class="new-btn folder" title="Новая папка в корне" onclick="newFolder()">▤</button>
          <button class="new-btn"        title="Новая заметка в корне" onclick="newNote()">+</button>
        </div>
      </div>
      <div class="tree" id="tree"></div>
    </div>
    <div class="editor-wrap">
      <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Начните писать…"></div>
    </div>
  </div>

  <div class="bottombar">
    <span class="hint" id="hintText"></span>
    <span class="word-count" id="wordCount">0 сл.</span>
  </div>

  <!-- Theme panel (transparency lives in a separate window now) -->
  <div class="panel theme-panel" id="themePanel">
    <div class="panel-title">Оформление</div>
    <div class="theme-row"><label for="bgColorInput">Фон</label><input type="color" id="bgColorInput" value="#0c0c12"></div>
    <div class="theme-row"><label for="accentColorInput">Акцент</label><input type="color" id="accentColorInput" value="#78c8ff"></div>
    <div class="theme-row"><label for="tintColorInput">Тинт</label><input type="color" id="tintColorInput" value="#000000"></div>
    <div class="theme-sep"></div>
    <div class="panel-title" style="margin-bottom:6px">Пресеты</div>
